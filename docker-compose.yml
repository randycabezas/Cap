name: cap

services:
  cap-web:
    container_name: cap-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # --- Database (fail fast if missing) ---
      DATABASE_URL: mysql://cap:${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}@mysql:3306/cap

      # --- Public URLs (use https in production) ---
      WEB_URL: ${CAP_URL:?CAP_URL is required}
      NEXTAUTH_URL: ${CAP_URL:?CAP_URL is required}

      # --- App secrets (fail fast) ---
      DATABASE_ENCRYPTION_KEY: ${DATABASE_ENCRYPTION_KEY:?DATABASE_ENCRYPTION_KEY is required}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      MEDIA_SERVER_WEBHOOK_SECRET: ${MEDIA_SERVER_WEBHOOK_SECRET:?MEDIA_SERVER_WEBHOOK_SECRET is required}

      # --- S3 / Object Storage (S3-compatible provider) ---
      CAP_AWS_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      CAP_AWS_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
      CAP_AWS_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
      CAP_AWS_REGION: ${S3_REGION:?S3_REGION is required}

      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:?S3_PUBLIC_ENDPOINT is required}
      S3_INTERNAL_ENDPOINT: ${S3_INTERNAL_ENDPOINT:?S3_INTERNAL_ENDPOINT is required}
      S3_PATH_STYLE: "${S3_PATH_STYLE:-false}"

      # --- Email (Resend) ---
      RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY is required}
      RESEND_FROM_DOMAIN: ${RESEND_FROM_DOMAIN:?RESEND_FROM_DOMAIN is required}

      # --- Media server ---
      MEDIA_SERVER_URL: http://media-server:3456
      MEDIA_SERVER_WEBHOOK_URL: http://cap-web:3000
    ports:
      - "${CAP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    networks:
      - cap-network

  media-server:
    container_name: cap-media-server
    build:
      context: ./apps/media-server
      dockerfile: Dockerfile.standalone
    restart: unless-stopped
    environment:
      PORT: 3456
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3456/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    networks:
      - cap-network

  mysql:
    container_name: cap-mysql
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: cap
      MYSQL_USER: cap

      # App user password (required)
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}

      # Root password (required)
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}

      # Hardening: do not allow remote root login
      MYSQL_ROOT_HOST: "localhost"

      # Optional: reduce init time/noise
      MYSQL_INITDB_SKIP_TZINFO: "1"
    command:
      - --max_connections=1000
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-name-resolve
    volumes:
      - cap-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "cap", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    networks:
      - cap-network

volumes:
  cap-mysql-data:

networks:
  cap-network:
    driver: bridge
